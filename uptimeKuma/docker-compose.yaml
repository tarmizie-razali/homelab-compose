name: uptimekuma
services:
  uptimekuma:
    cpu_shares: 90
    command: []
    container_name: uptimekuma
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: "134217728"
    hostname: uptimekuma
    image: louislam/uptime-kuma:latest
    labels:
      icon: https://cdn.jsdelivr.net/gh/walkxcode/dashboard-icons/png/uptime-kuma.png
    ports:
      - target: 3001
        published: "3002"
        protocol: tcp
    restart: unless-stopped
    volumes:
      - type: bind
        source: /DATA/AppData/uptimekuma/app/data
        target: /app/data
    devices: []
    cap_add: []
    environment: []
    network_mode: bridge
    privileged: false
x-casaos:
  architectures:
    - amd64
    - arm64
    - arm
  author: CasaOS Team
  category: Network
  description:
